<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#07101f">
  <title>SK Worker</title>
  <!-- Google Fonts removed: using system fonts for reliability -->
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg:#07101f; --card:#0d1a2d; --card2:#111f35; --line:#1a2d48;
      --cyan:#00d4ff; --green:#00e676; --amber:#ffab00; --red:#ff4d6d;
      --muted:#4d6080; --sub:#7a93b8; --text:#d8e8ff; --white:#ffffff;
      --st:env(safe-area-inset-top,44px); --sb:env(safe-area-inset-bottom,20px);
    }
    html,body { width:100%; height:100%; background:var(--bg); color:#d8e8ff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif; -webkit-font-smoothing:antialiased; overscroll-behavior:none; }
    .page { position:fixed; inset:0; display:flex; flex-direction:column; background:var(--bg); transition:opacity .2s; }
    .page.off { opacity:0; pointer-events:none; }

    /* OVERLAY */
    #ov { position:fixed; inset:0; background:rgba(7,16,31,.96); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:9999; transition:opacity .3s; }
    #ov.off { opacity:0; pointer-events:none; }
    .ring { width:48px; height:48px; border:3px solid rgba(255,255,255,.1); border-top-color:var(--cyan); border-radius:50%; animation:spin .75s linear infinite; }
    .ring-txt { font-size:13px; color:var(--sub); font-weight:600; letter-spacing:.5px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* TOAST */
    #toast { position:fixed; left:50%; bottom:calc(var(--sb) + 68px); transform:translateX(-50%) translateY(48px); padding:11px 24px; background:var(--card2); border:1px solid var(--line); border-radius:999px; font-size:14px; font-weight:600; white-space:nowrap; z-index:9998; pointer-events:none; transition:transform .32s cubic-bezier(.34,1.56,.64,1); box-shadow:0 8px 28px rgba(0,0,0,.5); }
    #toast.show { transform:translateX(-50%) translateY(0); }
    #toast.ok { color:var(--green); border-color:rgba(0,230,118,.35); }
    #toast.err { color:var(--red); border-color:rgba(255,77,109,.35); }

    /* LOGIN */
    #pgLogin { overflow-y:auto; -webkit-overflow-scrolling:touch; padding:calc(var(--st) + 40px) 20px calc(var(--sb) + 28px); align-items:center; }
    .brand-tag { font-size:11px; font-weight:700; letter-spacing:4px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .brand-h { font-size:36px; font-weight:900; line-height:1; text-align:center; margin-bottom:7px; background:linear-gradient(135deg,#fff 25%,var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .brand-sub { font-size:13px; color:var(--sub); margin-bottom:44px; }
    .sec-lbl { width:100%; max-width:440px; font-size:10px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }
    .pgrid { width:100%; max-width:440px; display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:28px; }
    .pc { display:flex; flex-direction:column; align-items:center; gap:10px; padding:18px 14px; background:var(--card); border:2px solid var(--line); border-radius:16px; cursor:pointer; transition:border-color .15s,background .15s,box-shadow .15s; }
    .pc.sel { border-color:var(--cyan); background:rgba(0,212,255,.07); box-shadow:0 0 0 1px var(--cyan),0 6px 22px rgba(0,212,255,.2); }
    .pc-dot { width:12px; height:12px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background .15s,box-shadow .15s; }
    .pc.sel .pc-dot { background:var(--cyan); box-shadow:0 0 8px var(--cyan); }
    .pc-name { font-size:15px; font-weight:700; text-align:center; line-height:1.3; color:#d8e8ff; word-break:break-word; }
    .pc.sel .pc-name { color:#ffffff; }
    .go-btn { width:100%; max-width:440px; padding:18px; background:var(--cyan); color:#000; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; font-size:16px; font-weight:800; border:none; border-radius:14px; cursor:pointer; letter-spacing:.5px; box-shadow:0 8px 28px rgba(0,212,255,.35); transition:transform .1s,box-shadow .1s; }
    .go-btn:active { transform:scale(.97); box-shadow:0 4px 14px rgba(0,212,255,.25); }
    .go-btn:disabled { opacity:.3; pointer-events:none; box-shadow:none; }

    /* MAIN */
    #pgMain { overflow:hidden; }
    .topbar { flex-shrink:0; background:var(--card); border-bottom:1px solid var(--line); padding:calc(var(--st) + 10px) 16px 12px; }
    .top-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .top-id { display:flex; align-items:center; gap:10px; }
    .top-av { width:36px; height:36px; border-radius:50%; background:rgba(0,212,255,.12); border:2px solid var(--cyan); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:var(--cyan); flex-shrink:0; }
    .top-name { font-size:16px; font-weight:700; }
    .top-role { font-size:11px; color:var(--sub); }
    .out-btn { padding:7px 13px; background:var(--card2); border:1px solid var(--line); border-radius:999px; color:var(--sub); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; }
    .tabs { display:flex; gap:4px; background:rgba(0,0,0,.25); border-radius:12px; padding:4px; }
    .tab { flex:1; padding:8px 4px; border:none; border-radius:9px; background:transparent; color:var(--sub); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; font-size:12px; font-weight:600; cursor:pointer; position:relative; transition:background .15s,color .15s; }
    .tab.on { background:var(--cyan); color:#000; }
    .tbadge { position:absolute; top:3px; right:5px; background:var(--red); color:#fff; font-size:9px; font-weight:800; border-radius:999px; padding:1px 4px; min-width:14px; }
    .kpi-row { flex-shrink:0; display:flex; gap:1px; background:var(--line); border-bottom:1px solid var(--line); }
    .kpi-c { flex:1; padding:10px 4px; background:var(--card); text-align:center; }
    .kpi-n { font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace; font-size:17px; font-weight:600; color:var(--cyan); line-height:1; }
    .kpi-l { font-size:8px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--sub); margin-top:3px; }
    .jlist { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:10px 14px 80px; display:flex; flex-direction:column; gap:12px; }
    .jlist::-webkit-scrollbar { display:none; }
    .jcard { display:block; background:var(--card); border:1px solid var(--line); border-radius:18px; width:100%; box-sizing:border-box; }
    .jcard.st-ready { border-color:rgba(0,230,118,.35); }
    .jcard.st-started { border-color:rgba(255,171,0,.45); }
    .jcard.st-completed { border-color:rgba(0,212,255,.2); opacity:.65; }
    .jcard.mine { border-color:rgba(0,212,255,.45); }
    .jch { padding:13px 14px 8px; display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
    .jinv { font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace; font-size:14px; font-weight:600; color:#ffffff; }
    .jrem { font-size:12px; color:var(--sub); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }
    .pill { flex-shrink:0; padding:3px 9px; border-radius:999px; font-size:10px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
    .p-idle { background:rgba(77,96,128,.2); color:var(--sub); }
    .p-ready { background:rgba(0,230,118,.12); color:var(--green); border:1px solid rgba(0,230,118,.3); }
    .p-started { background:rgba(255,171,0,.12); color:var(--amber); border:1px solid rgba(255,171,0,.3); }
    .p-completed { background:rgba(0,212,255,.12); color:var(--cyan); border:1px solid rgba(0,212,255,.3); }
    .jmeta { padding:4px 14px 10px; display:flex; gap:14px; flex-wrap:wrap; }
    .mi { display:flex; flex-direction:column; gap:1px; }
    .ml { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--sub); }
    .mv { font-size:13px; font-weight:600; color:var(--white); font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace; }
    .mv.hi { color:var(--cyan); }
    .prow { padding:10px 14px; border-top:1px solid rgba(26,45,72,1); display:flex; align-items:center; gap:8px; }
    .plbl { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--sub); flex-shrink:0; width:46px; }
    .psel { flex:1; padding:8px 10px; background:var(--card2); border:1px solid var(--line); border-radius:10px; color:var(--white); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; font-size:14px; font-weight:600; -webkit-appearance:none; }
    .ptag { display:inline-flex; align-items:center; padding:6px 12px; border-radius:10px; font-size:13px; font-weight:700; }
    .trow { padding:10px 14px; border-top:1px solid rgba(26,45,72,1); display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .tbl { display:flex; flex-direction:column; gap:4px; }
    .tlbl { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--sub); }
    .tsel { padding:9px 10px; background:var(--card2); border:1px solid var(--line); border-radius:10px; color:var(--white); font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace; font-size:13px; font-weight:600; width:100%; -webkit-appearance:none; }
    .tdis { padding:9px 10px; background:var(--card2); border:1px solid var(--line); border-radius:10px; font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace; font-size:13px; font-weight:600; color:var(--cyan); }
    .ebar { padding:7px 14px; background:rgba(255,171,0,.1); border-top:1px solid rgba(255,171,0,.2); display:flex; align-items:center; justify-content:space-between; }
    .elbl { font-size:10px; font-weight:700; color:var(--amber); letter-spacing:1px; text-transform:uppercase; }
    .eval { font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace; font-size:14px; font-weight:700; color:var(--amber); }
    .arow { padding:10px 14px 14px; border-top:1px solid rgba(26,45,72,1); display:flex; gap:8px; }
    .ab { flex:1; padding:13px 8px; border:none; border-radius:14px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; font-size:14px; font-weight:800; cursor:pointer; transition:transform .12s; }
    .ab:active { transform:scale(.96); }
    .ab:disabled { opacity:.3; pointer-events:none; }
    .ab-start { background:var(--amber); color:#000; box-shadow:0 4px 16px rgba(255,171,0,.3); }
    .ab-done { background:var(--green); color:#000; box-shadow:0 4px 16px rgba(0,230,118,.3); }
    .ab-comp { background:rgba(0,212,255,.12); color:var(--cyan); border:1px solid rgba(0,212,255,.3); }
    .empty { padding:50px 24px; text-align:center; color:var(--sub); }
    .eico { font-size:48px; margin-bottom:14px; }
    .etit { font-size:17px; font-weight:700; color:var(--white); margin-bottom:8px; }
    .esub { font-size:13px; line-height:1.5; }
    .btm { flex-shrink:0; padding:10px 16px calc(var(--sb) + 10px); background:var(--card); border-top:1px solid var(--line); display:flex; align-items:center; justify-content:center; gap:12px; }
    .syn-dot { width:7px; height:7px; border-radius:50%; background:var(--green); flex-shrink:0; animation:blink 2s infinite; }
    .syn-dot.busy { background:var(--amber); animation:spin .8s linear infinite; border-radius:50% 50% 0 50%; }
    .syn-dot.err { background:var(--red); animation:none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .syn-txt { font-size:12px; color:var(--sub); }
    .ref-btn { background:none; border:none; color:var(--cyan); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; font-size:13px; font-weight:700; cursor:pointer; padding:0; }
    /* 카드 접기/펼치기 */
    .jcard-body { display:none; }
    .jcard.open .jcard-body { display:block; }
    .jch { cursor:pointer; }
    .expand-icon { font-size:18px; color:var(--sub); transition:transform .2s; flex-shrink:0; }
    .jcard.open .expand-icon { transform:rotate(180deg); color:var(--cyan); }
  </style>
</head>
<body>

<div id="ov" style="display:none">
  <div class="ring"></div>
  <div class="ring-txt" id="ovTxt">Connecting...</div>
</div>
<div id="toast"></div>

<!-- LOGIN -->
<div class="page off" id="pgLogin">
  <div class="brand-tag">StyleKorean</div>
  <div class="brand-h">B2B Fulfillment</div>
  <div class="brand-sub">Worker Portal · v5.0</div>
  <div class="sec-lbl">Select Your Name</div>
  <div class="pgrid" id="pgrid"></div>
  <button class="go-btn" id="goBtn" onclick="App.login()" disabled>Start My Shift →</button>
</div>

<!-- MAIN -->
<div class="page off" id="pgMain">
  <div class="topbar">
    <div class="top-row">
      <div class="top-id">
        <div class="top-av" id="topDot">?</div>
        <div>
          <div class="top-name" id="topName">-</div>
          <div class="top-role">Warehouse Worker</div>
        </div>
      </div>
      <button class="out-btn" onclick="App.logout()">← Sign Out</button>
    </div>
    <div class="tabs">
      <button class="tab on" id="tMine" onclick="App.tab('mine')">My Jobs<span class="tbadge" id="tbadge" style="display:none">0</span></button>
      <button class="tab" id="tAll" onclick="App.tab('all')">All Jobs</button>
      <button class="tab" id="tDone" onclick="App.tab('done')">Completed</button>
    </div>
  </div>
  <div class="kpi-row">
    <div class="kpi-c"><div class="kpi-n" id="kMy">0</div><div class="kpi-l">My Active</div></div>
    <div class="kpi-c"><div class="kpi-n" id="kPend">0</div><div class="kpi-l">Pending</div></div>
    <div class="kpi-c"><div class="kpi-n" id="kDone">0</div><div class="kpi-l">Done</div></div>

  </div>

    <span class="syn-dot" id="synDot"></span>

    <button class="ref-btn" onclick="App.load()">Refresh ↻</button>
  </div>
</div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbykK9DWjem9ORHxfR_mpdZl5DVh-en0D6JpCdIuel305QmfqxoNU_NqSnjkhFk401hI/exec';
const FB_PICK = ['Ryan','Jane','Henry','Nicole'];
const TIMEOUT = 20000; // GAS cold start 대비 20초

// ══════════════════════════════════════════════════════════
//  NETWORK LAYER — GitHub Pages에서 실행 시 fetch 정상 작동
//  fetch → XHR → JSONP 순서로 시도
// ══════════════════════════════════════════════════════════

let _jsonpCounter = 0;

function netGet(url) {
  // fetch 먼저 시도 (GitHub Pages HTTPS 환경에서 정상 작동)
  return fetchGet(url)
    .catch(() => xhrGet(url))
    .catch(() => jsonpGet(url));
}

function jsonpGet(url) {
  return new Promise((res, rej) => {
    const cbName = '__jsonp_' + (++_jsonpCounter) + '_' + Date.now();
    const timer = setTimeout(() => {
      cleanup();
      rej(new Error('jsonp timeout'));
    }, TIMEOUT);

    function cleanup() {
      clearTimeout(timer);
      try { delete window[cbName]; } catch(e) {}
      const s = document.getElementById(cbName);
      if (s && s.parentNode) s.parentNode.removeChild(s);
    }

    window[cbName] = function(data) {
      cleanup();
      res(data);
    };

    const script = document.createElement('script');
    script.id = cbName;
    script.onerror = () => { cleanup(); rej(new Error('jsonp error')); };
    // Append callback param to URL
    const sep = url.includes('?') ? '&' : '?';
    script.src = url + sep + 'callback=' + cbName;
    document.head.appendChild(script);
  });
}

function xhrGet(url) {
  return new Promise((res, rej) => {
    try {
      const x = new XMLHttpRequest();
      const t = setTimeout(() => { x.abort(); rej(new Error('xhr timeout')); }, TIMEOUT);
      x.open('GET', url, true);
      x.onload = () => { clearTimeout(t); try { res(JSON.parse(x.responseText)); } catch(e) { rej(e); } };
      x.onerror = () => { clearTimeout(t); rej(new Error('xhr error')); };
      x.onabort = () => { clearTimeout(t); rej(new Error('xhr abort')); };
      x.send();
    } catch(e) { rej(e); }
  });
}

function fetchGet(url) {
  const controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
  const timer = controller ? setTimeout(() => controller.abort(), TIMEOUT) : null;
  return fetch(url + (url.includes('?') ? '&' : '?') + '_=' + Date.now(),
    controller ? { signal: controller.signal } : {}
  ).then(r => {
    if (timer) clearTimeout(timer);
    return r.json();
  }).catch(e => {
    if (timer) clearTimeout(timer);
    throw e;
  });
}

// POST 저장 함수
function netPost(data) {
  const body = new URLSearchParams({ op: 'upsertJob', data: JSON.stringify(data) }).toString();

  // 1st: fetch POST
  return fetch(GAS, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body
  })
  .then(r => r.json())
  .catch(() => {
    // 2nd: XHR POST
    return new Promise((res, rej) => {
      const x = new XMLHttpRequest();
      const t = setTimeout(() => { x.abort(); rej(new Error('timeout')); }, TIMEOUT);
      x.open('POST', GAS, true);
      x.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
      x.onload = () => { clearTimeout(t); try { res(JSON.parse(x.responseText)); } catch(e) { res({}); } };
      x.onerror = () => { clearTimeout(t); rej(new Error('network')); };
      x.onabort = () => { clearTimeout(t); rej(new Error('aborted')); };
      x.send(body);
    });
  })
  .catch(() => {
    // 3rd: JSONP GET (iOS 최후 수단)
    const url = GAS + '?op=upsertJob&data=' + encodeURIComponent(JSON.stringify(data));
    return jsonpGet(url).catch(() => ({}));
  });
}

// ══════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════
function localISO(d) {
  const z = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}T${z(d.getHours())}:${z(d.getMinutes())}:${z(d.getSeconds())}`;
}
function initials(n) {
  if (!n) return '?';
  const w = n.trim().split(/\s+/);
  if (w.length >= 2 && /[a-zA-Z]/.test(w[0][0])) return (w[0][0]+w[w.length-1][0]).toUpperCase();
  return n.slice(0,2).toUpperCase();
}
function fmt12(t) {
  if (!t || t==='-') return '-';
  const [h,m] = t.split(':').map(Number);
  const ap = h>=12?'PM':'AM', h12=h>12?h-12:(h===0?12:h);
  return `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')} ${ap}`;
}
function fmtD(r) {
  if (!r) return '-';
  const s = String(r).split('T')[0].split(' ')[0];
  const p = s.split('-');
  return p.length===3&&p[0].length===4 ? `${p[1]}/${p[2]}` : s;
}
function tOpts(sel) {
  const now = new Date();
  let sh = now.getHours(), sm = now.getMinutes()-30;
  if (sm<0){sh--;sm+=60;}
  sm = Math.floor(sm/5)*5;
  if (sh<8||(sh===8&&sm<30)){sh=8;sm=30;}
  let h = '<option value="">-- select --</option>';
  for (let hr=sh; hr<=17; hr++) {
    const s0=hr===sh?sm:0, e0=hr===17?30:55;
    for (let m=s0; m<=e0; m+=5) {
      const v=`${String(hr).padStart(2,'0')}:${String(m).padStart(2,'0')}`,
            ap=hr>=12?'PM':'AM', h12=hr>12?hr-12:(hr===0?12:hr),
            l=`${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')} ${ap}`;
      h += `<option value="${v}"${sel===v?' selected':''}>${l}</option>`;
    }
  }
  return h;
}

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
const S = { me:null, tab:'mine', jobs:[], pickers:FB_PICK, colors:{}, timer:null, elTimer:null };
const $ = id => document.getElementById(id);
function ov(show, msg) {
  var el = document.getElementById('ov');
  if (show) { el.style.display='flex'; if(msg) document.getElementById('ovTxt').textContent=msg; }
  else { el.style.display='none'; }
}
function showPage(id) { ['pgLogin','pgMain'].forEach(p => $(p).classList.toggle('off', p!==id)); }
let _tt;
function toast(msg, type='') {
  const el=$('toast'); el.textContent=msg; el.className='show '+type;
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'), 2800);
}
function setSyn(s) {
  const d=$('synDot'), t=$('synTxt');
  d.className = 'syn-dot '+(s==='busy'?'busy':s==='err'?'err':'');
  if (s==='busy') t.textContent='Syncing...';
  else if (s==='err') t.textContent='Connection error — tap Refresh';
  else { const tm=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); t.textContent=`Synced ${tm}`; }
}

// ══════════════════════════════════════════════════════════
//  APP
// ══════════════════════════════════════════════════════════
const App = {

  init() {
    // 항상 로그인 화면 먼저 표시 (자동 로그인 없음)
    let saved = null;
    try {
      const cachedSettings = localStorage.getItem('sk_settings');
      if (cachedSettings) {
        const cs = JSON.parse(cachedSettings);
        if (Array.isArray(cs.pickers) && cs.pickers.length) S.pickers = cs.pickers;
        S.colors = cs.colors || {};
      }
      saved = localStorage.getItem('sk_worker');
    } catch(e) {}

    this.buildGrid();

    // 이전에 선택한 이름만 표시 (버튼 선택 상태) - 자동 로그인 안 함
    if (saved && S.pickers.includes(saved)) {
      S.me = saved;
      setTimeout(() => {
        try {
          const btn = document.querySelector('.pc[data-n="' + saved + '"]');
          if (btn) { btn.classList.add('sel'); $('goBtn').disabled = false; }
        } catch(e) {}
      }, 50);
    }

    // 항상 로그인 화면 표시
    showPage('pgLogin');

    // 백그라운드에서 서버 설정 갱신
    setTimeout(() => { try { this.refreshSettings(); } catch(e) {} }, 500);
  },

  async refreshSettings() {
    try {
      const d = await netGet(`${GAS}?op=getSettings&t=${Date.now()}`);
      if (Array.isArray(d.pickers) && d.pickers.length) {
        S.pickers = d.pickers;
        S.colors = d.pickerColors || {};
        // 캐시에 저장
        localStorage.setItem('sk_settings', JSON.stringify({pickers: S.pickers, colors: S.colors}));
        // 로그인 화면이면 picker 목록 갱신
        if (!S.me) this.buildGrid();
      }
    } catch(e) {
      console.log('Settings refresh failed (non-blocking):', e.message);
    }
  },

  buildGrid() {
    const g = $('pgrid');
    g.innerHTML = S.pickers.map(p => {
      const col = S.colors[p] || '#00d4ff';
      const safe = p.replace(/'/g,"\\'");
      return `<button class="pc" data-n="${p}" onclick="App.pick('${safe}')">
        <div class="pc-dot" style="background:${col};box-shadow:0 0 8px ${col}66;"></div>
        <div class="pc-name">${p}</div>
      </button>`;
    }).join('');
  },

  pick(name) {
    S.me = name;
    document.querySelectorAll('.pc').forEach(b => b.classList.toggle('sel', b.dataset.n===name));
    $('goBtn').disabled = false;
  },

  login() {
    if (!S.me) return;
    localStorage.setItem('sk_worker', S.me);
    this.enterMain();
  },

  async enterMain() {
    showPage('pgMain');
    $('topDot').textContent = initials(S.me);
    $('topName').textContent = S.me;
    ov(false); // ★ 오버레이 즉시 제거 (네트워크 기다리지 않음)
    this.startTimers();
    this.load(); // 백그라운드 로드 (await 없음)
  },

  logout() {
    localStorage.removeItem('sk_worker');
    clearInterval(S.timer); clearInterval(S.elTimer);
    S.me = null; S.jobs = [];
    document.querySelectorAll('.pc').forEach(b => b.classList.remove('sel'));
    $('goBtn').disabled = true;
    showPage('pgLogin');
  },

  async load() {
    setSyn('busy');
    try {
      const d = await netGet(`${GAS}?op=listJobs&t=${Date.now()}`);
      if (d.ok) {
        S.jobs = d.jobs || [];
        if (Array.isArray(d.pickers) && d.pickers.length) S.pickers = d.pickers;
        S.colors = d.pickerColors || S.colors;
      }
      this.render();
      setSyn('ok');
    } catch(e) {
      console.log('Load error:', e);
      setSyn('err');
    }
  },

  tab(t) {
    S.tab = t;
    ['mine','all','done'].forEach(x => {
      $('t'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('on', x===t);
    });
    this.render();
  },

  render() {
    this.kpis();
    this.list();
  },

  kpis() {
    const j = S.jobs;
    const myA = j.filter(x=>x.picker===S.me&&x.status!=='completed').length;
    const pend = j.filter(x=>['ready','idle',''].includes((x.status||'').toLowerCase())).length;
    const done = j.filter(x=>x.status==='completed').length;
    $('kMy').textContent=myA; $('kPend').textContent=pend;
    $('kDone').textContent=done; $('kTot').textContent=j.length;
    const b=$('tbadge');
    if(myA>0){b.style.display='';b.textContent=myA;}else{b.style.display='none';}
  },

  list() {
    const el = $('jlist');
    let f;
    if (S.tab==='mine') f = S.jobs.filter(j => j.picker===S.me && j.status!=='completed');
    else if (S.tab==='done') f = S.jobs.filter(j => j.status==='completed');
    else f = S.jobs.filter(j => j.status!=='completed');

    const ord = {started:0,ready:1,idle:2,'':3};
    f.sort((a,b) => {
      const oa=ord[(a.status||'').toLowerCase()]??3, ob=ord[(b.status||'').toLowerCase()]??3;
      return oa!==ob ? oa-ob : (a.shipDate||'').localeCompare(b.shipDate||'');
    });

    if (!f.length) {
      const msgs = {
        mine: ['📋','No jobs assigned to you','Jobs assigned to you will appear here'],
        all:  ['📦','No active jobs','All jobs completed!'],
        done: ['✅','No completed jobs yet','Completed jobs will appear here']
      };
      const [ico,tit,sub] = msgs[S.tab];
      el.innerHTML = `<div class="empty"><div class="eico">${ico}</div><div class="etit">${tit}</div><div class="esub">${sub}</div></div>`;
      return;
    }
    el.innerHTML = f.map(j => this.card(j)).join('');
  },

  card(job) {
    const st = (job.status||'').toLowerCase() || 'idle';
    const isS=st==='started', isD=st==='completed', isMine=job.picker===S.me;
    const pcls = {idle:'p-idle',ready:'p-ready',started:'p-started',completed:'p-completed'}[st]||'p-idle';
    const ptxt = {idle:'Idle',ready:'Ready',started:'Started',completed:'Done'}[st]||'Idle';
    const col = S.colors[job.picker]||'#6366f1';
    const inv = job.invoice||'';

    // 카드 헤더 (항상 표시)
    const cardCls = `jcard st-${st}${isMine&&!isD?' mine':''}`;
    const headerHtml = `
      <div class="jch" onclick="App.toggleCard('${inv}')">
        <div style="flex:1;min-width:0;">
          <div class="jinv">${inv}</div>
          <div class="jrem">${job.remarks||'No remarks'}</div>
          <div style="display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;">
            <span style="font-size:11px;color:#7a93b8;">📅 ${fmtD(job.shipDate)}</span>
            <span style="font-size:11px;color:#00d4ff;">🚚 ${job.trucking||'-'}</span>
            <span style="font-size:11px;color:#7a93b8;">SKU ${job.skuCount||0} / Qty ${job.totalQty||0}</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
          <span class="pill ${pcls}">${ptxt}</span>
          <span class="expand-icon">⌄</span>
        </div>
      </div>`;

    // 카드 바디 (탭하면 펼쳐짐)
    let pickerHtml = '';
    if (isS||isD) {
      pickerHtml = `<div class="prow"><span class="plbl">Picker</span><span class="ptag" style="background:${col}22;color:${col};border:1px solid ${col}44;">${job.picker||'-'}</span></div>`;
    } else {
      const opts = S.pickers.map(p=>`<option value="${p}"${job.picker===p?' selected':''}>${p}</option>`).join('');
      pickerHtml = `<div class="prow"><span class="plbl">Picker</span><select class="psel" onchange="App.setPicker('${inv}',this.value)"><option value="">Select...</option>${opts}</select></div>`;
    }

    let timeHtml = '';
    if (isD) {
      timeHtml = `<div class="trow"><div class="tbl"><div class="tlbl">Start</div><div class="tdis">${fmt12(job.startTime)}</div></div><div class="tbl"><div class="tlbl">End</div><div class="tdis">${fmt12(job.endTime)}</div></div></div>`;
    } else if (isS) {
      timeHtml = `<div class="trow"><div class="tbl"><div class="tlbl">Started At</div><div class="tdis">${fmt12(job.startTime)}</div></div><div class="tbl"><div class="tlbl">End Time</div><select class="tsel" id="end-${inv}">${tOpts(job.endTime||'')}</select></div></div>`;
    } else {
      timeHtml = `<div class="trow"><div class="tbl"><div class="tlbl">Start Time</div><select class="tsel" id="st-${inv}">${tOpts(job.startTime||'')}</select></div><div class="tbl"><div class="tlbl">End Time</div><select class="tsel" id="end-${inv}">${tOpts(job.endTime||'')}</select></div></div>`;
    }

    let elapsedHtml = '';
    if (isS && job.startAtISO) {
      elapsedHtml = `<div class="ebar"><span class="elbl">⏱ Elapsed</span><span class="eval" id="el-${inv}">-</span></div>`;
    }

    let actionHtml = '';
    if (isD) {
      actionHtml = `<div class="arow"><button class="ab ab-comp" disabled>✓ Completed</button></div>`;
    } else if (isS) {
      actionHtml = `<div class="arow"><button class="ab ab-done" onclick="App.complete('${inv}')">✓ Complete Job</button></div>`;
    } else {
      const canStart = !!job.picker;
      actionHtml = `<div class="arow"><button class="ab ab-start" onclick="App.start('${inv}')" ${!canStart?'disabled':''}>▶ Start</button><button class="ab ab-done" onclick="App.complete('${inv}')">✓ Complete</button></div>`;
    }

    // Started 카드는 기본 열림, 나머지는 닫힘
    const openCls = isS ? ' open' : '';
    return `<div class="${cardCls}${openCls}" id="card-${inv}">
      ${headerHtml}
      <div class="jcard-body">
        ${pickerHtml}${timeHtml}${elapsedHtml}${actionHtml}
      </div>
    </div>`;
  },

  toggleCard(inv) {
    const card = document.getElementById('card-' + inv);
    if (card) card.classList.toggle('open');
  },

  async setPicker(inv, picker) {
    if (!picker) return;
    const j = S.jobs.find(x=>x.invoice===inv);
    if (j) j.picker = picker;
    this.render();
    try { await netPost({ invoice:inv, picker }); } catch(e) { toast('Save error','err'); }
  },

  async start(inv) {
    const job = S.jobs.find(j=>j.invoice===inv);
    if (!job) return;
    if (!job.picker) { toast('Select a picker first','err'); return; }
    const el = $(`st-${inv}`);
    const sel = el ? el.value : '';
    const now = new Date();
    let st, sISO;
    if (sel) {
      const [h,m]=sel.split(':');
      const d=new Date(now.getFullYear(),now.getMonth(),now.getDate(),+h,+m);
      st=sel; sISO=localISO(d);
    } else {
      st=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      sISO=localISO(now);
    }
    Object.assign(job,{startTime:st,startAtISO:sISO,status:'started'});
    this.render();
    toast('Job started ▶','ok');
    try { await netPost({invoice:inv,startTime:st,startAtISO:sISO,status:'started'}); }
    catch(e) { toast('Sync error — check connection','err'); }
    setTimeout(()=>this.load(), 9000);
  },

  async complete(inv) {
    const job = S.jobs.find(j=>j.invoice===inv);
    if (!job) return;
    const el = $(`end-${inv}`);
    const sel = el ? el.value : '';
    const now = new Date();
    let et, eISO;
    if (sel) {
      const [h,m]=sel.split(':');
      const d=new Date(now.getFullYear(),now.getMonth(),now.getDate(),+h,+m);
      et=sel; eISO=localISO(d);
    } else {
      et=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      eISO=localISO(now);
    }
    Object.assign(job,{endTime:et,endAtISO:eISO,status:'completed'});
    this.render();
    toast('Job completed ✓','ok');
    try { await netPost({invoice:inv,endTime:et,endAtISO:eISO,status:'completed'}); }
    catch(e) { toast('Sync error — check connection','err'); }
    setTimeout(()=>this.load(), 9000);
  },

  startTimers() {
    clearInterval(S.timer); clearInterval(S.elTimer);
    S.timer = setInterval(()=>{ if(!document.hidden&&S.me) this.load(); }, 10000);
    S.elTimer = setInterval(()=>{
      S.jobs.filter(j=>j.status==='started'&&j.startAtISO).forEach(job=>{
        const el=$(`el-${job.invoice}`);
        if(!el) return;
        const start=new Date(job.startAtISO);
        const mins=Math.floor((Date.now()-start.getTime())/60000);
        if(mins<0){el.textContent='0 min';return;}
        const h=Math.floor(mins/60),m=mins%60;
        el.textContent=h>0?`${h}h ${m}m`:`${m} min`;
      });
    }, 15000);
  }
};

// ★ 가장 먼저 실행: 오버레이 즉시 제거 (스크립트 파싱 완료 즉시)
(function() {
  try {
    var ov = document.getElementById('ov');
    if (ov) {
      // 500ms 내로 init()이 정상 실행되지 않으면 강제로 오버레이 제거
      setTimeout(function() {
        ov.style.display = 'none';
        // 페이지도 강제 표시
        var login = document.getElementById('pgLogin');
        if (login) { login.classList.remove('off'); login.style.opacity = '1'; }
      }, 2000);
    }
  } catch(e) {}
})();

document.addEventListener('DOMContentLoaded', function() {
  try { App.init(); } catch(e) {
    console.log('Init error:', e);
    // init() 실패해도 무조건 로그인 화면 표시
    try { document.getElementById('ov').style.display='none'; } catch(x){}
    try {
      document.getElementById('pgLogin').classList.remove('off');
      document.getElementById('pgLogin').style.opacity = '1';
    } catch(x){}
  }
});
document.addEventListener('visibilitychange', ()=>{
  if (!document.hidden && S.me) App.load();
});
</script>
</body>
</html>
