<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#07101f">
  <title>SK Worker</title>

  <!-- ★ PWA 설정 -->
  <link rel="manifest" href="/sk-worker/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SK Worker">
  <meta name="theme-color" content="#6366f1">
  <link rel="apple-touch-icon" href="/sk-worker/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/sk-worker/icon-192.png">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg:#07101f; --card:#0d1a2d; --card2:#111f35; --line:#1a2d48;
      --cyan:#00d4ff; --green:#00e676; --amber:#ffab00; --red:#ff4d6d;
      --muted:#4d6080; --sub:#7a93b8; --text:#d8e8ff; --white:#ffffff;
      --st:env(safe-area-inset-top,44px); --sb:env(safe-area-inset-bottom,20px);
    }
    html, body {
      width:100%; height:100%;
      background:#07101f;
      color:#d8e8ff;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      overscroll-behavior:none;
      /* ★ iOS 검정화면 방지 */
      -webkit-overflow-scrolling:touch;
    }

    /* ★ inset:0 → top/left/right/bottom으로 변경 (구형 iOS 호환) */
    .page {
      position:fixed;
      top:0; left:0; right:0; bottom:0;
      display:-webkit-flex;
      display:flex;
      -webkit-flex-direction:column;
      flex-direction:column;
      background:#07101f;
      /* ★ visibility 사용 (opacity만 쓰면 iOS에서 렌더링 버그) */
      -webkit-transition:opacity .2s;
      transition:opacity .2s;
    }
    .page.off {
      opacity:0;
      pointer-events:none;
      /* ★ iOS에서 visibility:hidden 추가로 완전히 숨김 */
      visibility:hidden;
    }
    .page.on {
      opacity:1;
      pointer-events:auto;
      visibility:visible;
    }

    /* OVERLAY */
    #ov {
      position:fixed;
      top:0; left:0; right:0; bottom:0;
      background:rgba(7,16,31,.96);
      display:-webkit-flex;
      display:flex;
      -webkit-flex-direction:column;
      flex-direction:column;
      -webkit-align-items:center;
      align-items:center;
      -webkit-justify-content:center;
      justify-content:center;
      gap:16px;
      z-index:9999;
    }
    .ring { width:48px; height:48px; border:3px solid rgba(255,255,255,.1); border-top-color:#00d4ff; border-radius:50%; -webkit-animation:spin .75s linear infinite; animation:spin .75s linear infinite; }
    .ring-txt { font-size:13px; color:#7a93b8; font-weight:600; letter-spacing:.5px; }
    @-webkit-keyframes spin { to { -webkit-transform:rotate(360deg); transform:rotate(360deg); } }
    @keyframes spin { to { -webkit-transform:rotate(360deg); transform:rotate(360deg); } }

    /* TOAST */
    #toast {
      position:fixed;
      left:50%;
      bottom:calc(env(safe-area-inset-bottom, 20px) + 68px);
      -webkit-transform:translateX(-50%) translateY(48px);
      transform:translateX(-50%) translateY(48px);
      padding:11px 24px;
      background:#111f35;
      border:1px solid #1a2d48;
      border-radius:999px;
      font-size:14px;
      font-weight:600;
      white-space:nowrap;
      z-index:9998;
      pointer-events:none;
      -webkit-transition:-webkit-transform .32s cubic-bezier(.34,1.56,.64,1);
      transition:transform .32s cubic-bezier(.34,1.56,.64,1);
      box-shadow:0 8px 28px rgba(0,0,0,.5);
    }
    #toast.show { -webkit-transform:translateX(-50%) translateY(0); transform:translateX(-50%) translateY(0); }
    #toast.ok { color:#00e676; border-color:rgba(0,230,118,.35); }
    #toast.err { color:#ff4d6d; border-color:rgba(255,77,109,.35); }

    /* LOGIN */
    #pgLogin {
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      padding:calc(env(safe-area-inset-top, 44px) + 40px) 20px calc(env(safe-area-inset-bottom, 20px) + 28px);
      -webkit-align-items:center;
      align-items:center;
    }
    .brand-tag { font-size:12px; font-weight:700; letter-spacing:4px; text-transform:uppercase; color:#4d6080; margin-bottom:8px; }
    .brand-h {
      font-size:40px; font-weight:900; line-height:1; text-align:center; margin-bottom:7px;
      background:-webkit-linear-gradient(135deg,#fff 25%,#00d4ff);
      background:linear-gradient(135deg,#fff 25%,#00d4ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .brand-sub { font-size:15px; color:#7a93b8; margin-bottom:44px; }
    .sec-lbl { width:100%; max-width:440px; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#4d6080; margin-bottom:14px; }
    .status-refresh-info { width:100%; max-width:440px; font-size:11px; color:#4d6080; text-align:right; margin-bottom:6px; }
    .pgrid { width:100%; max-width:440px; display:-webkit-flex; display:flex; -webkit-flex-wrap:wrap; flex-wrap:wrap; gap:10px; margin-bottom:28px; }
    /* ★ grid → flex로 변경 (iOS 9 호환) */
    .pc {
      width:calc(50% - 5px);
      display:-webkit-flex;
      display:flex;
      -webkit-flex-direction:column;
      flex-direction:column;
      -webkit-align-items:center;
      align-items:center;
      gap:10px;
      padding:18px 14px;
      background:#0d1a2d;
      border:2px solid #1a2d48;
      border-radius:16px;
      cursor:pointer;
      -webkit-transition:border-color .15s,background .15s,box-shadow .15s;
      transition:border-color .15s,background .15s,box-shadow .15s;
      position:relative;
      /* ★ button 기본 스타일 제거 (iOS) */
      -webkit-appearance:none;
      appearance:none;
      text-align:center;
      box-sizing:border-box;
    }
    .pc.sel { border-color:#00d4ff; background:rgba(0,212,255,.07); box-shadow:0 0 0 1px #00d4ff,0 6px 22px rgba(0,212,255,.2); }
    .pc-dot { width:14px; height:14px; border-radius:50%; background:#4d6080; -webkit-flex-shrink:0; flex-shrink:0; -webkit-transition:background .3s,box-shadow .3s; transition:background .3s,box-shadow .3s; }
    .pc.sel .pc-dot { background:#00d4ff; box-shadow:0 0 8px #00d4ff; }
    .pc-status { position:absolute; top:10px; right:10px; width:11px; height:11px; border-radius:50%; border:2px solid #111f35; }
    .pc-status.working  { background:#00d4ff; box-shadow:0 0 7px #00d4ff; -webkit-animation:blink 1.5s infinite; animation:blink 1.5s infinite; }
    .pc-status.idle     { background:#ffab00; box-shadow:0 0 7px #ffab00; }
    .pc-status.offline  { background:#ff4d6d; box-shadow:0 0 5px #ff4d6d; }
    .pc-status-label { font-size:10px; font-weight:700; letter-spacing:.3px; margin-top:-4px; }
    .pc-status-label.working { color:#00d4ff; }
    .pc-status-label.idle    { color:#ffab00; }
    .pc-status-label.offline { color:#ff4d6d; }
    .pc-name { font-size:16px; font-weight:700; text-align:center; line-height:1.3; color:#d8e8ff; word-break:break-word; }
    .pc.sel .pc-name { color:#ffffff; }
    .go-btn {
      width:100%; max-width:440px; padding:18px;
      background:#00d4ff; color:#000;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
      font-size:18px; font-weight:800; border:none; border-radius:14px; cursor:pointer;
      letter-spacing:.5px; box-shadow:0 8px 28px rgba(0,212,255,.35);
      -webkit-transition:-webkit-transform .1s,box-shadow .1s;
      transition:transform .1s,box-shadow .1s;
      -webkit-appearance:none; appearance:none;
    }
    .go-btn:active { -webkit-transform:scale(.97); transform:scale(.97); box-shadow:0 4px 14px rgba(0,212,255,.25); }
    .go-btn:disabled { opacity:.3; pointer-events:none; box-shadow:none; }

    /* MAIN */
    #pgMain { overflow:hidden; }
    .topbar {
      -webkit-flex-shrink:0; flex-shrink:0;
      background:#0d1a2d; border-bottom:1px solid #1a2d48;
      padding:calc(env(safe-area-inset-top, 44px) + 10px) 16px 12px;
    }
    .top-row { display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:space-between; justify-content:space-between; margin-bottom:12px; }
    .top-id { display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; gap:10px; }
    .top-av { width:36px; height:36px; border-radius:50%; background:rgba(0,212,255,.12); border:2px solid #00d4ff; display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center; font-size:12px; font-weight:800; color:#00d4ff; -webkit-flex-shrink:0; flex-shrink:0; }
    .top-name { font-size:18px; font-weight:700; }
    .top-role { font-size:13px; color:#7a93b8; }
    .out-btn { padding:9px 15px; background:#111f35; border:1px solid #1a2d48; border-radius:999px; color:#7a93b8; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; -webkit-appearance:none; appearance:none; }
    .tabs { display:-webkit-flex; display:flex; gap:4px; background:rgba(0,0,0,.25); border-radius:12px; padding:4px; }
    .tab { -webkit-flex:1; flex:1; padding:8px 4px; border:none; border-radius:9px; background:transparent; color:#7a93b8; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; font-size:14px; font-weight:600; cursor:pointer; position:relative; -webkit-transition:background .15s,color .15s; transition:background .15s,color .15s; -webkit-appearance:none; appearance:none; }
    .tab.on { background:#00d4ff; color:#000; }
    .tbadge { position:absolute; top:3px; right:5px; background:#ff4d6d; color:#fff; font-size:9px; font-weight:800; border-radius:999px; padding:1px 4px; min-width:14px; }
    .kpi-row { -webkit-flex-shrink:0; flex-shrink:0; display:-webkit-flex; display:flex; gap:1px; background:#1a2d48; border-bottom:1px solid #1a2d48; }
    .kpi-c { -webkit-flex:1; flex:1; padding:10px 4px; background:#0d1a2d; text-align:center; }
    .kpi-n { font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace; font-size:20px; font-weight:600; color:#00d4ff; line-height:1; }
    .kpi-l { font-size:10px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:#7a93b8; margin-top:3px; }
    .jlist { -webkit-flex:1; flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:10px 14px 80px; display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; gap:12px; }
    .jlist::-webkit-scrollbar { display:none; }
    .jcard { display:block; background:#0d1a2d; border:1px solid #1a2d48; border-radius:18px; width:100%; box-sizing:border-box; }
    .jcard.st-ready { border-color:rgba(0,230,118,.35); }
    .jcard.st-started { border-color:rgba(255,171,0,.45); }
    .jcard.st-completed { border-color:rgba(0,212,255,.35); }
    .jcard.mine { border-color:rgba(0,212,255,.45); }
    .jch { padding:13px 14px 8px; display:-webkit-flex; display:flex; -webkit-align-items:flex-start; align-items:flex-start; -webkit-justify-content:space-between; justify-content:space-between; gap:8px; cursor:pointer; }
    .jinv { font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace; font-size:14px; font-weight:600; color:#ffffff; }
    .jrem { font-size:14px; color:#7a93b8; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }
    .pill { -webkit-flex-shrink:0; flex-shrink:0; padding:4px 11px; border-radius:999px; font-size:12px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
    .p-idle { background:rgba(77,96,128,.2); color:#7a93b8; }
    .p-ready { background:rgba(0,230,118,.12); color:#00e676; border:1px solid rgba(0,230,118,.3); }
    .p-started { background:rgba(255,171,0,.12); color:#ffab00; border:1px solid rgba(255,171,0,.3); }
    .p-completed { background:rgba(0,212,255,.12); color:#00d4ff; border:1px solid rgba(0,212,255,.3); }
    .prow { padding:10px 14px; border-top:1px solid rgba(26,45,72,1); display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; gap:8px; }
    .plbl { font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#7a93b8; -webkit-flex-shrink:0; flex-shrink:0; width:46px; }
    .psel { -webkit-flex:1; flex:1; padding:10px 12px; background:#111f35; border:1px solid #1a2d48; border-radius:10px; color:#ffffff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; font-size:16px; font-weight:600; -webkit-appearance:none; appearance:none; }
    .ptag { display:-webkit-inline-flex; display:inline-flex; -webkit-align-items:center; align-items:center; padding:8px 14px; border-radius:10px; font-size:15px; font-weight:700; }
    .trow { padding:10px 14px; border-top:1px solid rgba(26,45,72,1); display:-webkit-flex; display:flex; gap:8px; }
    .tbl { display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; -webkit-flex:1; flex:1; gap:4px; }
    .tlbl { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#7a93b8; }
    .tsel { padding:11px 12px; background:#111f35; border:1px solid #1a2d48; border-radius:10px; color:#ffffff; font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace; font-size:15px; font-weight:600; width:100%; -webkit-appearance:none; appearance:none; }
    .tdis { padding:11px 12px; background:#111f35; border:1px solid #1a2d48; border-radius:10px; font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace; font-size:13px; font-weight:600; color:#00d4ff; }
    .ebar { padding:7px 14px; background:rgba(255,171,0,.1); border-top:1px solid rgba(255,171,0,.2); display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:space-between; justify-content:space-between; }
    .elbl { font-size:10px; font-weight:700; color:#ffab00; letter-spacing:1px; text-transform:uppercase; }
    .eval { font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace; font-size:14px; font-weight:700; color:#ffab00; }
    .arow { padding:10px 14px 14px; border-top:1px solid rgba(26,45,72,1); display:-webkit-flex; display:flex; gap:8px; }
    .ab { -webkit-flex:1; flex:1; padding:15px 8px; border:none; border-radius:14px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; font-size:16px; font-weight:800; cursor:pointer; -webkit-transition:-webkit-transform .12s; transition:transform .12s; -webkit-appearance:none; appearance:none; }
    .ab:active { -webkit-transform:scale(.96); transform:scale(.96); }
    .ab:disabled { opacity:.3; pointer-events:none; }
    /* Start 버튼은 항상 활성 pulse - picker 없어도 완전히 동일하게 */
    .ab.ab-start:disabled { opacity:1 !important; pointer-events:auto !important; }
    .ab-start { background:linear-gradient(135deg,#f59e0b,#d97706); color:#fff; box-shadow:0 4px 16px rgba(245,158,11,.3); position:relative; overflow:visible; }
    .ab-start::after { content:''; position:absolute; inset:-3px; border-radius:17px; animation:mob-ring 1.6s ease-out infinite; pointer-events:none; }
    @keyframes mob-ring { 0%{box-shadow:0 0 0 0 rgba(245,158,11,.75);} 55%{box-shadow:0 0 0 9px rgba(245,158,11,.15);} 100%{box-shadow:0 0 0 15px rgba(245,158,11,0);} }
    .ab-done { background:linear-gradient(135deg,#10b981,#059669); color:#fff; box-shadow:0 4px 16px rgba(16,185,129,.3); }
    .ab-comp { background:transparent; color:#34d399; border:1.5px solid rgba(16,185,129,.45); cursor:default; }
    .empty { padding:50px 24px; text-align:center; color:#7a93b8; }
    .eico { font-size:48px; margin-bottom:14px; }
    .etit { font-size:17px; font-weight:700; color:#ffffff; margin-bottom:8px; }
    .esub { font-size:13px; line-height:1.5; }
    .btm { -webkit-flex-shrink:0; flex-shrink:0; padding:10px 16px calc(env(safe-area-inset-bottom, 20px) + 10px); background:#0d1a2d; border-top:1px solid #1a2d48; display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center; gap:12px; }
    .syn-dot { width:7px; height:7px; border-radius:50%; background:#00e676; -webkit-flex-shrink:0; flex-shrink:0; -webkit-animation:blink 2s infinite; animation:blink 2s infinite; }
    .syn-dot.busy { background:#ffab00; -webkit-animation:spin .8s linear infinite; animation:spin .8s linear infinite; border-radius:50% 50% 0 50%; }
    .syn-dot.err { background:#ff4d6d; -webkit-animation:none; animation:none; }
    @-webkit-keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .syn-txt { font-size:14px; color:#7a93b8; }
    .ref-btn { background:none; border:none; color:#00d4ff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; font-size:15px; font-weight:700; cursor:pointer; padding:0; -webkit-appearance:none; appearance:none; }
    .dur-bar { padding:10px 16px; background:rgba(0,212,255,.06); border-top:1px solid rgba(0,212,255,.15); display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:space-between; justify-content:space-between; }
    .dur-lbl { font-size:12px; font-weight:700; color:#00d4ff; letter-spacing:.5px; text-transform:uppercase; }
    .dur-val { font-family:'SF Mono',Consolas,monospace; font-size:18px; font-weight:700; color:#00d4ff; }
    .search-bar { padding:10px 14px; background:#0d1a2d; border-bottom:1px solid #1a2d48; }
    .search-input { width:100%; padding:11px 16px 11px 40px; background:#111f35; border:1.5px solid #1a2d48; border-radius:12px; color:#fff; font-size:15px; font-family:-apple-system,sans-serif; outline:none; box-sizing:border-box; -webkit-appearance:none; appearance:none; }
    .search-input:focus { border-color:#00d4ff; }
    .search-input::-webkit-input-placeholder { color:#4d6080; }
    .search-input::placeholder { color:#4d6080; }
    .search-wrap { position:relative; }
    .search-icon { position:absolute; left:13px; top:50%; -webkit-transform:translateY(-50%); transform:translateY(-50%); font-size:16px; color:#4d6080; pointer-events:none; }
    .search-clear { position:absolute; right:12px; top:50%; -webkit-transform:translateY(-50%); transform:translateY(-50%); font-size:18px; color:#4d6080; cursor:pointer; display:none; }
    .search-result-count { font-size:11px; color:#7a93b8; margin-top:6px; padding-left:2px; }
    .jcard-body { display:none; }
    .jcard.open .jcard-body { display:block; }
    .expand-icon { font-size:18px; color:#7a93b8; -webkit-transition:-webkit-transform .2s; transition:transform .2s; -webkit-flex-shrink:0; flex-shrink:0; }
    .jcard.open .expand-icon { -webkit-transform:rotate(180deg); transform:rotate(180deg); color:#00d4ff; }
  </style>
</head>
<body>

<!-- ★ 오버레이: 처음부터 숨김 처리 -->
<div id="ov" style="display:none;">
  <div class="ring"></div>
  <div class="ring-txt" id="ovTxt">Loading...</div>
</div>
<div id="toast"></div>

<!-- LOGIN -->
<div class="page off" id="pgLogin">
  <div class="brand-tag">StyleKorean</div>
  <div class="brand-h">B2B Fulfillment</div>
  <div class="brand-sub">Worker Portal · v5.2</div>
  <div class="sec-lbl">Select Your Name</div>
  <div class="status-refresh-info" id="statusRefreshInfo">Checking status...</div>
  <div class="pgrid" id="pgrid"></div>
  <button class="go-btn" id="goBtn" onclick="App.login()" disabled>Start My Shift →</button>
</div>

<!-- MAIN -->
<div class="page off" id="pgMain">
  <div class="topbar">
    <div class="top-row">
      <div class="top-id">
        <div class="top-av" id="topDot">?</div>
        <div>
          <div class="top-name" id="topName">-</div>
          <div class="top-role">Warehouse Worker</div>
        </div>
      </div>
      <button class="out-btn" onclick="App.logout()">← Sign Out</button>
    </div>
    <div class="tabs">
      <button class="tab on" id="tMine" onclick="App.tab('mine')">My Jobs<span class="tbadge" id="tbadge" style="display:none">0</span></button>
      <button class="tab" id="tAll" onclick="App.tab('all')">All Jobs</button>
      <button class="tab" id="tDone" onclick="App.tab('done')">Completed</button>
    </div>
  </div>
  <div class="kpi-row">
    <div class="kpi-c"><div class="kpi-n" id="kMy">0</div><div class="kpi-l">My Active</div></div>
    <div class="kpi-c"><div class="kpi-n" id="kPend">0</div><div class="kpi-l">Pending</div></div>
    <div class="kpi-c"><div class="kpi-n" id="kDone">0</div><div class="kpi-l">Done</div></div>

var GAS = 'https://script.google.com/macros/s/AKfycbykK9DWjem9ORHxfR_mpdZl5DVh-en0D6JpCdIuel305QmfqxoNU_NqSnjkhFk401hI/exec';

// ★ 근무 시간 설정
var WORK_SEGMENTS = [
  { start: 8*60+30,  end: 12*60     },
  { start: 13*60,    end: 17*60+30  }
];

// ★ 근무 시간만 계산 (점심/퇴근 후 제외)
function calcWorkingMins(startISO, endISO) {
  try {
    var start = new Date(startISO);
    var end   = endISO ? new Date(endISO) : new Date();
    if (isNaN(start.getTime()) || end <= start) return 0;
    var totalMins = 0;
    var cur = new Date(start.getTime());
    var maxDays = 14, dayCount = 0;
    while (cur < end && dayCount < maxDays) {
      var dayBase = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate(), 0, 0, 0, 0);
      var nextDay = new Date(dayBase.getTime());
      nextDay.setDate(nextDay.getDate() + 1);
      var rangeStart = cur;
      var rangeEnd   = end < nextDay ? end : nextDay;
      var fromMins = (rangeStart - dayBase) / 60000;
      var toMins   = (rangeEnd   - dayBase) / 60000;
      for (var i = 0; i < WORK_SEGMENTS.length; i++) {
        var seg = WORK_SEGMENTS[i];
        var oStart = fromMins > seg.start ? fromMins : seg.start;
        var oEnd   = toMins   < seg.end   ? toMins   : seg.end;
        if (oEnd > oStart) totalMins += (oEnd - oStart);
      }
      cur = nextDay;
      dayCount++;
    }
    return Math.floor(totalMins);
  } catch(e) { return 0; }
}

function fmtWorkMins(mins) {
  if (mins <= 0) return '0 min';
  var h = Math.floor(mins / 60), m = mins % 60;
  return h > 0 ? (h + 'h ' + m + 'm') : (m + ' min');
}

// ══════════════ NETWORK ══════════════
var _jsonpCounter = 0;

function netGet(url) {
  return fetchGet(url)['catch'](function() { return xhrGet(url); })['catch'](function() { return jsonpGet(url); });
}

function jsonpGet(url) {
  return new Promise(function(res, rej) {
    var cbName = '__jsonp_' + (++_jsonpCounter) + '_' + Date.now();
    var timer = setTimeout(function() { cleanup(); rej(new Error('jsonp timeout')); }, TIMEOUT);
    function cleanup() {
      clearTimeout(timer);
      try { delete window[cbName]; } catch(e) {}
      var s = document.getElementById(cbName);
      if (s && s.parentNode) s.parentNode.removeChild(s);
    }
    window[cbName] = function(data) { cleanup(); res(data); };
    var script = document.createElement('script');
    script.id = cbName;
    script.onerror = function() { cleanup(); rej(new Error('jsonp error')); };
    var sep = url.indexOf('?') >= 0 ? '&' : '?';
    script.src = url + sep + 'callback=' + cbName;
    document.head.appendChild(script);
  });
}

function xhrGet(url) {
  return new Promise(function(res, rej) {
    try {
      var x = new XMLHttpRequest();
      var t = setTimeout(function() { x.abort(); rej(new Error('xhr timeout')); }, TIMEOUT);
      x.open('GET', url, true);
      x.onload = function() { clearTimeout(t); try { res(JSON.parse(x.responseText)); } catch(e) { rej(e); } };
      x.onerror = function() { clearTimeout(t); rej(new Error('xhr error')); };
      x.onabort = function() { clearTimeout(t); rej(new Error('xhr abort')); };
      x.send();
    } catch(e) { rej(e); }
  });
}

function fetchGet(url) {
  if (typeof fetch === 'undefined') return Promise.reject(new Error('no fetch'));
  var controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
  var timer = controller ? setTimeout(function() { controller.abort(); }, TIMEOUT) : null;
  var sep = url.indexOf('?') >= 0 ? '&' : '?';
  return fetch(url + sep + '_=' + Date.now(), controller ? { signal: controller.signal } : {})
    .then(function(r) { if (timer) clearTimeout(timer); return r.json(); })
    ['catch'](function(e) { if (timer) clearTimeout(timer); throw e; });
}

function netPost(data) {
  var body = 'op=upsertJob&data=' + encodeURIComponent(JSON.stringify(data));
  var doFetch = typeof fetch !== 'undefined'
    ? fetch(GAS, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:body })
        .then(function(r) { return r.json(); })
    : Promise.reject(new Error('no fetch'));

  return doFetch['catch'](function() {
    return new Promise(function(res, rej) {
      var x = new XMLHttpRequest();
      var t = setTimeout(function() { x.abort(); rej(new Error('timeout')); }, TIMEOUT);
      x.open('POST', GAS, true);
      x.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
      x.onload = function() { clearTimeout(t); try { res(JSON.parse(x.responseText)); } catch(e) { res({}); } };
      x.onerror = function() { clearTimeout(t); rej(new Error('network')); };
      x.onabort = function() { clearTimeout(t); rej(new Error('aborted')); };
      x.send(body);
    });
  })['catch'](function() {
    return jsonpGet(GAS + '?op=upsertJob&data=' + encodeURIComponent(JSON.stringify(data)))['catch'](function() { return {}; });
  });
}

// ══════════════ HELPERS ══════════════
function localISO(d) {
  var z = function(n) { return String(n).padStart ? String(n).padStart(2,'0') : (n < 10 ? '0' + n : '' + n); };
  return d.getFullYear() + '-' + z(d.getMonth()+1) + '-' + z(d.getDate()) + 'T' + z(d.getHours()) + ':' + z(d.getMinutes()) + ':' + z(d.getSeconds());
}
function initials(n) {
  if (!n) return '?';
  var w = n.trim().split(/\s+/);
  if (w.length >= 2 && /[a-zA-Z]/.test(w[0][0])) return (w[0][0] + w[w.length-1][0]).toUpperCase();
  return n.slice(0,2).toUpperCase();
}
function fmt12(t) {
  if (!t || t === '-') return '-';
  var parts = t.split(':').map(Number);
  var h = parts[0], m = parts[1];
  var ap = h >= 12 ? 'PM' : 'AM';
  var h12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  return pad2(h12) + ':' + pad2(m) + ' ' + ap;
}
function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function fmtD(r) {
  if (!r) return '-';
  var s = String(r).split('T')[0].split(' ')[0];
  var p = s.split('-');
  return (p.length === 3 && p[0].length === 4) ? (p[1] + '/' + p[2]) : s;
}
function tOpts(sel) {
  var now = new Date();
  var sh = now.getHours(), sm = now.getMinutes() - 30;
  if (sm < 0) { sh--; sm += 60; }
  sm = Math.floor(sm / 5) * 5;
  if (sh < 8 || (sh === 8 && sm < 30)) { sh = 8; sm = 30; }
  var h = '<option value="">-- select --</option>';
  for (var hr = sh; hr <= 17; hr++) {
    var s0 = (hr === sh) ? sm : 0;
    var e0 = (hr === 17) ? 30 : 55;
    for (var mn = s0; mn <= e0; mn += 5) {
      var v = pad2(hr) + ':' + pad2(mn);
      var ap = hr >= 12 ? 'PM' : 'AM';
      var h12 = hr > 12 ? hr - 12 : (hr === 0 ? 12 : hr);
      var l = pad2(h12) + ':' + pad2(mn) + ' ' + ap;
      h += '<option value="' + v + '"' + (sel === v ? ' selected' : '') + '>' + l + '</option>';
    }
  }
  return h;
}

// ★ localStorage 안전 접근 (iOS Private 브라우징 대응)

var S = {

function setSyn(s) {

}

// ══════════════ APP ══════════════
var App = {

  init: function() {
    try {
      var cachedSettings = LS.get('sk_settings');
      if (cachedSettings) {
        var cs = JSON.parse(cachedSettings);
        if (Array.isArray(cs.pickers) && cs.pickers.length) S.pickers = cs.pickers;
        S.colors = cs.colors || {};
      }
    } catch(e) {}

    this.buildGrid();

    var saved = LS.get('sk_worker');
    if (saved && S.pickers.indexOf(saved) >= 0) {
      S.me = saved;
      setTimeout(function() {
        try {
          var btn = document.querySelector('.pc[data-n="' + saved + '"]');
          if (btn) { btn.classList.add('sel'); $$('goBtn').disabled = false; }
        } catch(e) {}
      }, 80);
    }

    // ★ 로그인 페이지 표시 (명시적)
    showPage('pgLogin');

    this.startLoginRefresh();

    var self = this;
    setTimeout(function() { try { self.refreshSettings(); } catch(e) {} }, 500);
  },

  startLoginRefresh: function() {
    clearInterval(S.loginTimer);
    var self = this;
    this.loadStatusOnly();
    // ★ 10초마다 갱신 (안정성과 실시간성 균형)
    S.loginTimer = setInterval(function() {
      if (!S.me) self.loadStatusOnly();
    }, 10000);
  },

  loadStatusOnly: function() {
    var self = this;
    netGet(GAS + '?op=listJobs&t=' + Date.now()).then(function(d) {
      if (d && d.ok) {
        // ★ 로컬 pending picker 보존 (GAS 미저장 상태)
        var pendingPickers = {};
        for (var pi = 0; pi < S.jobs.length; pi++) {
          var pj = S.jobs[pi];
          if (pj.picker && (pj.status||'').toLowerCase() === 'ready') pendingPickers[pj.invoice] = pj.picker;
        }
        S.jobs = d.jobs || [];
        for (var ri = 0; ri < S.jobs.length; ri++) {
          if (!S.jobs[ri].picker && pendingPickers[S.jobs[ri].invoice]) S.jobs[ri].picker = pendingPickers[S.jobs[ri].invoice];
        }
        if (Array.isArray(d.pickers) && d.pickers.length) {
          S.pickers = d.pickers;
          S.colors = d.pickerColors || S.colors;
        }
        self.updateWorkerStatus();
        var now = new Date();
        var h = now.getHours(), m = now.getMinutes(), sec = now.getSeconds();
        var ap = h >= 12 ? 'PM' : 'AM';
        var h12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
        var el = $$('statusRefreshInfo');
        if (el) el.textContent = 'Updated ' + pad2(h12) + ':' + pad2(m) + ':' + pad2(sec) + ' ' + ap;
      }
    })['catch'](function() {
      var el = $$('statusRefreshInfo');
      if (el) el.textContent = 'Status update failed — retrying...';
    });
  },

  refreshSettings: function() {
    var self = this;
    netGet(GAS + '?op=getSettings&t=' + Date.now()).then(function(d) {
      if (d && Array.isArray(d.pickers) && d.pickers.length) {
        S.pickers = d.pickers;
        S.colors = d.pickerColors || {};
        LS.set('sk_settings', JSON.stringify({ pickers: S.pickers, colors: S.colors }));
        if (!S.me) self.buildGrid();
      }
    })['catch'](function(e) { /* silent */ });
  },

  buildGrid: function() {
    var g = $$('pgrid');
    if (!g) return;
    var stLabelMap = { working:'🔵 Working', idle:'🟡 Standing By', offline:'🔴 Off Duty' };
    var existingBtns = g.querySelectorAll('.pc');

    if (existingBtns.length !== S.pickers.length) {
      // ★ 처음 빌드 또는 pickers 변경 시 전체 재빌드
      var html = '';
      for (var i = 0; i < S.pickers.length; i++) {
        var p = S.pickers[i];
        var col = S.colors[p] || '#00d4ff';
        var safe = p.replace(/'/g, "\\'");
        var st = S.workerStatus[p] || 'offline';
        var stLabel = stLabelMap[st] || stLabelMap.offline;
        var _badge = window.CelebrationSystem ? window.CelebrationSystem.getBadge(p) : '';
        html += '<button class="pc" data-n="' + p + '" onclick="App.pick(\'' + safe + '\')">'
              + '<span class="pc-status ' + st + '"></span>'
              + '<div class="pc-dot" style="background:' + col + ';box-shadow:0 0 8px ' + col + '66;"></div>'
              + '<div class="pc-name">' + p + (_badge ? ' <span style="font-size:12px;">' + _badge + '</span>' : '') + '</div>'
              + '<div class="pc-status-label ' + st + '">' + stLabel + '</div>'
              + '</button>';
      }
      g.innerHTML = html;
    } else {
      // ★ 이미 빌드된 경우: 상태가 바뀐 카드만 업데이트 (깜빡임/선택 초기화 방지)
      for (var j = 0; j < existingBtns.length; j++) {
        var btn = existingBtns[j];
        var name = btn.dataset.n;
        var newSt = S.workerStatus[name] || 'offline';
        var dotEl = btn.querySelector('.pc-status');
        var lblEl = btn.querySelector('.pc-status-label');
        if (dotEl) {
          var curClass = dotEl.className.replace('pc-status', '').trim();
          if (curClass !== newSt) {
            // ★ 상태가 변경된 카드만 DOM 업데이트
            dotEl.className = 'pc-status ' + newSt;
            if (lblEl) {
              lblEl.className = 'pc-status-label ' + newSt;
              lblEl.textContent = stLabelMap[newSt] || stLabelMap.offline;
            }
          }
        }
      }
    }

    // 선택 상태 복원 (선택한 이름 유지)
    if (S.me) {
      var selBtn = g.querySelector('.pc[data-n="' + S.me + '"]');
      if (selBtn && !selBtn.classList.contains('sel')) selBtn.classList.add('sel');
    }
  },

  updateWorkerStatus: function() {
    var status = {};
    for (var i = 0; i < S.pickers.length; i++) status[S.pickers[i]] = 'offline';
    for (var j = 0; j < S.jobs.length; j++) {
      var job = S.jobs[j];
      var st = (job.status || '').toLowerCase();
      var picker = job.picker;
      if (!picker || S.pickers.indexOf(picker) < 0) continue;
      if (st === 'started') {
        status[picker] = 'working';
      } else if ((st === 'ready' || st === 'idle') && status[picker] !== 'working') {
        status[picker] = 'idle';
      }
    }
    S.workerStatus = status;
    if (!S.me) this.buildGrid();
  },

  pick: function(name) {
    S.me = name;
    var btns = document.querySelectorAll('.pc');

      btns[i].classList.toggle('sel', btns[i].dataset.n === name);

  },

  login: function() {
    if (!S.me) return;
    LS.set('sk_worker', S.me);
    clearInterval(S.loginTimer);
    this.enterMain();
  },

  enterMain: function() {
    showPage('pgMain');
    $$('topDot').textContent = initials(S.me);
    $$('topName').textContent = S.me;
    this.startTimers();
    this.load();
  },

  logout: function() {
    LS.del('sk_worker');
    clearInterval(S.timer); clearInterval(S.elTimer);
    S.me = null; S.jobs = [];
    var btns = document.querySelectorAll('.pc');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('sel');
    $$('goBtn').disabled = true;
    showPage('pgLogin');
    this.startLoginRefresh();
  },

  load: function() {
    setSyn('busy');
    var self = this;
    netGet(GAS + '?op=listJobs&t=' + Date.now()).then(function(d) {
      if (d && d.ok) {
        // ★ 로컬 pending picker 보존 (GAS 미저장 상태)
        var pendingPickers = {};
        for (var pi = 0; pi < S.jobs.length; pi++) {
          var pj = S.jobs[pi];
          if (pj.picker && (pj.status||'').toLowerCase() === 'ready') pendingPickers[pj.invoice] = pj.picker;
        }
        S.jobs = d.jobs || [];
        for (var ri = 0; ri < S.jobs.length; ri++) {
          if (!S.jobs[ri].picker && pendingPickers[S.jobs[ri].invoice]) S.jobs[ri].picker = pendingPickers[S.jobs[ri].invoice];
        }
        if (Array.isArray(d.pickers) && d.pickers.length) S.pickers = d.pickers;
        S.colors = d.pickerColors || S.colors;
        // 🎉 오늘 완료 건수 동기화
        if (window.CelebrationSystem) window.CelebrationSystem.syncFromJobs(S.jobs);
      }
      self.render();
      setSyn('ok');
    })['catch'](function(e) {
      setSyn('err');
    });
  },

  tab: function(t) {
    S.tab = t;
    S.searchQuery = '';
    S.openCards = {};
    try {
      $$('searchInput').value = '';
      $$('searchClear').style.display = 'none';
      $$('searchCount').textContent = '';
    } catch(e) {}
    var tabs = ['mine', 'all', 'done'];
    for (var i = 0; i < tabs.length; i++) {
      var x = tabs[i];
      var id = 't' + x.charAt(0).toUpperCase() + x.slice(1);
      var el = $$(id);
      if (el) el.classList.toggle('on', x === t);
    }
    var showSearch = (t === 'all' || t === 'done');
    $$('searchBar').style.display = showSearch ? 'block' : 'none';
    this.render();
  },

  render: function() {
    this.updateWorkerStatus();
    this.kpis();
    this.list();
  },

  kpis: function() {
    var j = S.jobs;
    var myA = 0, pend = 0, done = 0;
    for (var i = 0; i < j.length; i++) {
      var st = (j[i].status || '').toLowerCase();
      if (j[i].picker === S.me && st !== 'completed') myA++;
      if (st !== 'completed') pend++; // ★ 미완료 전체 카운트
      if (st === 'completed') done++;
    }
    $$('kMy').textContent = myA;
    // ★ 내가 작업중이면 내 작업 수만큼 빼고, 아니면 전체 미완료 표시
    $$('kPend').textContent = myA > 0 ? Math.max(0, pend - myA) : pend;
    $$('kDone').textContent = done;
    $$('kTot').textContent = j.length;
    var b = $$('tbadge');
    if (myA > 0) { b.style.display = ''; b.textContent = myA; } else { b.style.display = 'none'; }
  },

  list: function() {
    var el = $$('jlist');
    var f = [];
    for (var i = 0; i < S.jobs.length; i++) {
      var j = S.jobs[i];
      var st = (j.status || '').toLowerCase();
      if (S.tab === 'mine') { if (j.picker === S.me && st !== 'completed') f.push(j); }
      else if (S.tab === 'done') { if (st === 'completed') f.push(j); }
      else { if (st !== 'completed') f.push(j); }
    }

    var truckOrd = { 'tk':1, 'ups':2, 'pu':3, 'fedex':4, 'other':5 };
    var statusOrd = { 'started':0, 'ready':1, 'idle':2, '':3 };
    f.sort(function(a, b) {
      // 1순위: 상태 (STARTED 맨 위)
      var sa = statusOrd[(a.status || '').toLowerCase()];
      var sb = statusOrd[(b.status || '').toLowerCase()];
      if (sa === undefined) sa = 3;
      if (sb === undefined) sb = 3;
      if (sa !== sb) return sa - sb;
      // 2순위: 날짜(shipDate)
      var dateA = (a.shipDate || '').substring(0, 10);
      var dateB = (b.shipDate || '').substring(0, 10);
      if (dateA !== dateB) return dateA.localeCompare(dateB);
      // 3순위: Trucking (TK→UPS→PU→FedEx)
      var ta = truckOrd[(a.trucking || '').toLowerCase()] || 999;
      var tb = truckOrd[(b.trucking || '').toLowerCase()] || 999;
      return ta - tb;
    });

    if (S.searchQuery) {
      var q = S.searchQuery.toLowerCase();
      var filtered = [];
      for (var k = 0; k < f.length; k++) {
        var job = f[k];
        if ((job.invoice || '').toLowerCase().indexOf(q) >= 0 ||
            (job.remarks || '').toLowerCase().indexOf(q) >= 0 ||
            (job.picker  || '').toLowerCase().indexOf(q) >= 0) {
          filtered.push(job);
        }
      }
      f = filtered;
    }

    if (S.tab !== 'mine' && S.searchQuery) {
      $$('searchCount').textContent = f.length + ' result' + (f.length !== 1 ? 's' : '') + ' found';
    } else {
      try { $$('searchCount').textContent = ''; } catch(e) {}
    }

    if (!f.length) {
      var msgsMap = {
        mine: ['📋','No jobs assigned to you','Jobs assigned to you will appear here'],
        all:  ['📦','No active jobs','All jobs completed!'],
        done: ['✅','No completed jobs yet','Completed jobs will appear here']
      };
      var m = msgsMap[S.tab] || msgsMap.all;
      el.innerHTML = '<div class="empty"><div class="eico">' + m[0] + '</div><div class="etit">' + m[1] + '</div><div class="esub">' + m[2] + '</div></div>';
      return;
    }
    var html = '';
    for (var x = 0; x < f.length; x++) html += this.card(f[x]);
    el.innerHTML = html;

    var openKeys = Object.keys(S.openCards);
    for (var oi = 0; oi < openKeys.length; oi++) {
      var card = document.getElementById('card-' + openKeys[oi]);
      if (card) card.classList.add('open');
    }
  },

  card: function(job) {
    var st = (job.status || '').toLowerCase() || 'idle';
    var isS = st === 'started', isD = st === 'completed', isMine = job.picker === S.me;
    var pclsMap = { idle:'p-idle', ready:'p-ready', started:'p-started', completed:'p-completed' };
    var pcls = pclsMap[st] || 'p-idle';
    var ptxtMap = { idle:'Idle', ready:'Ready', started:'Started', completed:'Done' };
    var ptxt = ptxtMap[st] || 'Idle';
    var col = S.colors[job.picker] || '#6366f1';
    var inv = job.invoice || '';

    var cardCls = 'jcard st-' + st + (isMine && !isD ? ' mine' : '');

    var headerHtml = '<div class="jch" onclick="App.toggleCard(\'' + inv + '\')">'
      + '<div style="flex:1;min-width:0;">'
      + '<div class="jinv">' + inv + '</div>'
      + '<div class="jrem">' + (job.remarks || 'No remarks') + '</div>'
      + '<div style="display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;">'
      + '<span style="font-size:11px;color:#7a93b8;">📅 ' + fmtD(job.shipDate) + '</span>'
      + '<span style="font-size:11px;color:#00d4ff;">🚚 ' + (job.trucking || '-') + '</span>'
      + '<span style="font-size:11px;color:#7a93b8;">SKU ' + (job.skuCount || 0) + ' / Qty ' + (job.totalQty || 0) + '</span>'
      + '</div></div>'
      + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">'
      + '<span class="pill ' + pcls + '">' + ptxt + '</span>'
      + '<span class="expand-icon">&#8964;</span>'
      + '</div></div>';

    var pickerHtml = '';
    if (isS || isD) {
      var _pickerBadge = window.CelebrationSystem ? window.CelebrationSystem.getBadge(job.picker) : '';
      var _pickerName = job.picker || 'Unknown';
      pickerHtml = '<div class="prow"><span class="plbl">Picker</span>'
        + '<span class="ptag" style="background:' + col + '22;color:' + col + ';border:1px solid ' + col + '44;display:inline-flex;flex-direction:row;align-items:center;gap:5px;">'
        + _pickerName
        + (_pickerBadge ? '<span style="font-size:13px;line-height:1;">' + _pickerBadge + '</span>' : '')
        + '</span></div>';
    } else {
      var opts = '<option value="">Select...</option>';
      for (var pi = 0; pi < S.pickers.length; pi++) {
        var p = S.pickers[pi];
        opts += '<option value="' + p + '"' + (job.picker === p ? ' selected' : '') + '>' + p + '</option>';
      }
      pickerHtml = '<div class="prow"><span class="plbl">Picker</span>'
        + '<select class="psel" onchange="App.setPicker(\'' + inv + '\',this.value)">' + opts + '</select></div>';
    }

    var timeHtml = '';
    if (isD) {
      var durHtml = '';
      try {
        if (job.startAtISO && job.endAtISO) {
          var workMins = calcWorkingMins(job.startAtISO, job.endAtISO);
          if (workMins > 0) {
            durHtml = '<div class="dur-bar"><span class="dur-lbl">⏱ Work Duration (excl. lunch)</span><span class="dur-val">' + fmtWorkMins(workMins) + '</span></div>';
          }
        }
      } catch(e) {}
      timeHtml = '<div class="trow"><div class="tbl"><div class="tlbl">Start</div><div class="tdis">' + fmt12(job.startTime) + '</div></div>'
        + '<div class="tbl"><div class="tlbl">End</div><div class="tdis">' + fmt12(job.endTime) + '</div></div></div>' + durHtml;
    } else if (isS) {
      // ★ started 상태: End Time 항상 활성화 (10초 refresh 후에도 유지)
      timeHtml = '<div class="trow"><div class="tbl"><div class="tlbl">Started At</div><div class="tdis">' + fmt12(job.startTime) + '</div></div>'
        + '<div class="tbl"><div class="tlbl">End Time</div><div class="tdis" style="color:#2d4a6a;font-style:italic;font-size:13px;">Auto-fill on Complete</div></div></div>';
    } else {
      // ★ idle/ready 상태: 픽커 없으면 Start Time 비활성, End Time은 항상 비활성
      var stDisabled = !job.picker ? ' disabled style="opacity:0.4"' : '';
      timeHtml = '<div class="trow"><div class="tbl"><div class="tlbl">Start Time</div><div class="tdis" style="color:#2d4a6a;font-style:italic;font-size:13px;">' + (job.picker ? '-- auto on Start --' : 'Select picker first') + '</div></div>'
        + '<div class="tbl"><div class="tlbl">End Time</div><div class="tdis" style="color:#2d4a6a;font-style:italic;font-size:13px;">Available after Start</div></div></div>';
    }

    var elapsedHtml = '';
    if (isS && job.startAtISO) {
      var workMinsEl = calcWorkingMins(job.startAtISO);
      elapsedHtml = '<div class="ebar"><span class="elbl">⏱ Work Elapsed (excl. lunch/OT)</span><span class="eval" id="el-' + inv + '">' + fmtWorkMins(workMinsEl) + '</span></div>';
    }

    var actionHtml = '';
    if (isD) {
      actionHtml = '<div class="arow"><button class="ab ab-comp">Job Completed</button></div>';
    } else if (isS) {
      actionHtml = '<div class="arow"><button class="ab ab-done" onclick="mobConfirmComplete(\'' + inv + '\')">✓ Complete Job</button></div>';
    } else {
      var canStart = !!job.picker;
      actionHtml = '<div class="arow">'
        + '<button class="ab ab-start" onclick="' + (canStart ? 'mobConfirmStart(\'' + inv + '\')' : 'mobNudgePicker()') + '">▶ Start Job</button></div>';
    }

    var openCls = isS ? ' open' : '';
    return '<div class="' + cardCls + openCls + '" id="card-' + inv + '">'
      + headerHtml
      + '<div class="jcard-body">' + pickerHtml + timeHtml + elapsedHtml + actionHtml + '</div>'
      + '</div>';
  },

  toggleCard: function(inv) {
    var card = document.getElementById('card-' + inv);
    if (card) {
      card.classList.toggle('open');
      if (card.classList.contains('open')) S.openCards[inv] = 1;
      else delete S.openCards[inv];
    }
  },

  setPicker: function(inv, picker) {
    // picker 선택 시 GAS 저장 안함 → Start Confirm 시 함께 저장
    for (var i = 0; i < S.jobs.length; i++) {
      if (S.jobs[i].invoice === inv) {
        var st = (S.jobs[i].status || '').toLowerCase();
        if (st === 'started' || st === 'completed') return;
        S.jobs[i].picker = picker; // 로컬 state만 업데이트
        break;
      }
    }
    this.render(); // UI만 갱신
  },
  cancelPicker: function(inv) {
    // Start 모달 Cancel → 로컬 picker 초기화 (GAS 호출 없음)
    for (var i = 0; i < S.jobs.length; i++) {
      if (S.jobs[i].invoice === inv) {
        S.jobs[i].picker = '';
        break;
      }
    }
    this.render();
  },

  start: function(inv) {
    var self = this;
    var job = null;
    for (var i = 0; i < S.jobs.length; i++) { if (S.jobs[i].invoice === inv) { job = S.jobs[i]; break; } }
    if (!job) return;
    if (!job.picker) { toast('⚠ Please select a picker first!', 'err'); return; }
    // 현재시각 자동 입력
    var now = new Date();
    var h = String(now.getHours()).padStart ? String(now.getHours()).padStart(2,'0') : (now.getHours()<10?'0':'')+now.getHours();
    var m = String(now.getMinutes()).padStart ? String(now.getMinutes()).padStart(2,'0') : (now.getMinutes()<10?'0':'')+now.getMinutes();
    var st = h + ':' + m;
    var d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), now.getMinutes());
    var sISO = localISO(d);
    job.startTime = st; job.startAtISO = sISO; job.status = 'started';
    this.render();
    toast('Job started ▶ ' + st, 'ok');
    netPost({ invoice:inv, picker:job.picker, startTime:st, startAtISO:sISO, status:'started' })
      ['catch'](function() { toast('Sync error — check connection', 'err'); });
    setTimeout(function() { self.load(); }, 9000);
  },

  complete: function(inv) {
    var self = this;
    var job = null;
    for (var i = 0; i < S.jobs.length; i++) { if (S.jobs[i].invoice === inv) { job = S.jobs[i]; break; } }
    if (!job) return;
    if (!job.picker) { toast('⚠ Please select a picker first!', 'err'); return; }
    if (!job.startTime) { toast('⚠ Please press Start first!', 'err'); return; }
    // 현재시각 자동 입력
    var now = new Date();
    var h = String(now.getHours()).padStart ? String(now.getHours()).padStart(2,'0') : (now.getHours()<10?'0':'')+now.getHours();
    var m = String(now.getMinutes()).padStart ? String(now.getMinutes()).padStart(2,'0') : (now.getMinutes()<10?'0':'')+now.getMinutes();
    var et = h + ':' + m;
    var d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), now.getMinutes());
    var eISO = localISO(d);
    job.endTime = et; job.endAtISO = eISO; job.status = 'completed';
    var celebSku = job.skuCount || 0;
    this.render();
    toast('Job completed ✓ ' + et, 'ok');
    // 🎉 셀러브레이션 체크
    if (window.CelebrationSystem && S.me) window.CelebrationSystem.onComplete(S.me, celebSku);
    netPost({ invoice:inv, endTime:et, endAtISO:eISO, status:'completed' })
      ['catch'](function() { toast('Sync error — check connection', 'err'); });
    setTimeout(function() { self.load(); }, 9000);
  },

  onSearch: function(val) {
    S.searchQuery = val.trim();
    $$('searchClear').style.display = val ? 'inline' : 'none';
    this.render();
  },

  clearSearch: function() {
    S.searchQuery = '';
    $$('searchInput').value = '';
    $$('searchClear').style.display = 'none';
    $$('searchCount').textContent = '';
    this.render();
    try { $$('searchInput').focus(); } catch(e) {}
  },

  startTimers: function() {
    clearInterval(S.timer); clearInterval(S.elTimer);
    var self = this;
    S.timer = setInterval(function() {
      if (!document.hidden && S.me) self.load();
    }, 10000);
    S.elTimer = setInterval(function() {
      for (var i = 0; i < S.jobs.length; i++) {
        var job = S.jobs[i];
        if (job.status === 'started' && job.startAtISO) {
          var el = $$('el-' + job.invoice);
          if (el) el.textContent = fmtWorkMins(calcWorkingMins(job.startAtISO));
        }
      }
    }, 30000);
  }
};

// ★ DOMContentLoaded + load 이중 보장 (iOS Safari 대응)
function startApp() {
  try { App.init(); } catch(e) {
    // 초기화 실패해도 로그인 화면은 표시
    try { showPage('pgLogin'); } catch(e2) {}
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startApp);
} else {
  // 이미 로드된 경우 (iOS에서 가끔 발생)
  startApp();
}

// ★ window.load도 백업으로 등록
window.addEventListener('load', function() {
  var login = $$('pgLogin');
  if (login && login.classList.contains('off')) {
    // 아직 표시 안 됐으면 강제 표시
    try { showPage('pgLogin'); } catch(e) {}
  }
});

document.addEventListener('visibilitychange', function() {
  if (!document.hidden && S.me) App.load();
});

<script>
/* ========================================================
   🎉 DAILY ACHIEVEMENT CELEBRATION SYSTEM v2
   점수 = 완료건수 × 1점 + 총SKU × 0.5점
   ⭐ Rising Star 50pt | 🌟 Super Star 80pt | 👑 Legend 110pt
   매일 자정 자동 리셋
   ======================================================== */
(function() {

  var MILESTONES = [
    { score:50, tier:1, name:'Rising Star',      emoji:'⭐', color:'#FFD700', particleColor:['#FFD700','#FFF8DC','#FFFACD','#ffffff'], shapes:['star'],                   duration:3000 },
    { score:80, tier:2, name:'Super Star',        emoji:'🌟', color:'#FF8C00', particleColor:['#FF8C00','#FFD700','#FFA500','#ffffff','#FFE4B5'], shapes:['star','circle'], duration:3000 },
    { score:110, tier:3, name:'Legend of the Day', emoji:'👑', color:'#FFD700', particleColor:['#FFD700','#FF4500','#FF1493','#00FF7F','#1E90FF'], shapes:['crown','star','circle'], duration:5000 }
  ];

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
  }

  // 오늘 점수 가져오기
  function getScore(picker) {
    try { return parseFloat(localStorage.getItem('cs_' + picker + '_' + todayStr()) || '0'); } catch(e) { return 0; }
  }

  // 점수 저장
  function setScore(picker, score) {
    try { localStorage.setItem('cs_' + picker + '_' + todayStr(), String(score)); } catch(e) {}
  }

  // 이미 발동된 티어 목록
  function getFired(picker) {
    try { return JSON.parse(localStorage.getItem('cf_' + picker + '_' + todayStr()) || '[]'); } catch(e) { return []; }
  }

  function setFired(picker, tier) {
    try {
      var f = getFired(picker);
      if (f.indexOf(tier) < 0) { f.push(tier); localStorage.setItem('cf_' + picker + '_' + todayStr(), JSON.stringify(f)); }
    } catch(e) {}
  }

  // 파티클 애니메이션
  function runParticles(canvas, milestone) {
    var ctx = canvas.getContext('2d');
    var W = canvas.width, H = canvas.height;
    var particles = [];
    var start = Date.now();
    var tier = milestone.tier;
    var count = tier === 3 ? 140 : tier === 2 ? 90 : 60;
    var colors = milestone.particleColor;
    var shapes = milestone.shapes;

    function makeParticle() {
      return {
        x: Math.random() * W,
        y: Math.random() * -H * 0.5,
        vx: (Math.random() - 0.5) * 6,
        vy: Math.random() * 5 + 2,
        size: Math.random() * 14 + 5,
        color: colors[Math.floor(Math.random() * colors.length)],
        shape: shapes[Math.floor(Math.random() * shapes.length)],
        rot: Math.random() * 360,
        rotV: (Math.random() - 0.5) * 8,
        alpha: 1
      };
    }

    for (var i = 0; i < count; i++) particles.push(makeParticle());

    function drawStar(ctx, x, y, r) {
      ctx.beginPath();
      for (var k = 0; k < 5; k++) {
        var a = (k * 4 * Math.PI / 5) - Math.PI/2;
        var b = ((k * 4 + 2) * Math.PI / 5) - Math.PI/2;
        if (k === 0) ctx.moveTo(x + r * Math.cos(a), y + r * Math.sin(a));
        else ctx.lineTo(x + r * Math.cos(a), y + r * Math.sin(a));
        ctx.lineTo(x + r*0.4 * Math.cos(b), y + r*0.4 * Math.sin(b));
      }
      ctx.closePath(); ctx.fill();
    }

    function animate() {
      var elapsed = Date.now() - start;
      if (elapsed > milestone.duration + 500) return;
      ctx.clearRect(0, 0, W, H);

      if (tier === 3) {
        var grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W/2);
        grd.addColorStop(0, 'rgba(255,215,0,0.08)');
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
      }

      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x += p.vx; p.y += p.vy; p.rot += p.rotV;
        if (elapsed > milestone.duration * 0.6) p.alpha = Math.max(0, p.alpha - 0.015);
        if (p.y > H + 20) { particles[i] = makeParticle(); continue; }

        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;

        if (p.shape === 'star') {
          drawStar(ctx, 0, 0, p.size);
        } else if (p.shape === 'crown') {
          ctx.font = (p.size * 2) + 'px serif';
          ctx.fillText('👑', -p.size, p.size * 0.5);
        } else {
          ctx.beginPath(); ctx.arc(0, 0, p.size/2, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
      }
      requestAnimationFrame(animate);
    }
    animate();
  }

  function fire(milestone, picker, score) {
    var old = document.getElementById('_celebOverlay');
    if (old) old.parentNode.removeChild(old);

    var overlay = document.createElement('div');
    overlay.id = '_celebOverlay';
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;pointer-events:none;';

    var canvas = document.createElement('canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;';
    overlay.appendChild(canvas);

    var tierBg = { 1:'rgba(25,20,0,0.93)', 2:'rgba(30,15,0,0.93)', 3:'rgba(20,15,0,0.95)' };

    if (!document.getElementById('_celebStyle')) {
      var style = document.createElement('style');
      style.id = '_celebStyle';
      style.textContent = '@keyframes _celebPop{0%{transform:translate(-50%,-50%) scale(0.4);opacity:0}70%{transform:translate(-50%,-50%) scale(1.06);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}@keyframes _celebFadeOut{0%{opacity:1}100%{opacity:0}}';
      document.head.appendChild(style);
    }

    var banner = document.createElement('div');
    banner.style.cssText = [
      'position:absolute;top:50%;left:50%;',
      'transform:translate(-50%,-50%) scale(0.4);',
      'background:' + tierBg[milestone.tier] + ';',
      'border:3px solid ' + milestone.color + ';',
      'border-radius:24px;padding:32px 56px;text-align:center;',
      'animation:_celebPop 0.55s cubic-bezier(0.175,0.885,0.32,1.275) forwards;',
      'box-shadow:0 0 80px ' + milestone.color + '55;',
      'min-width:300px;'
    ].join('');

    banner.innerHTML = [
      '<div style="font-size:68px;line-height:1;margin-bottom:6px;">' + milestone.emoji + '</div>',
      '<div style="font-size:28px;font-weight:900;color:#fff;letter-spacing:1px;">' + picker + '</div>',
      '<div style="font-size:22px;font-weight:700;color:' + milestone.color + ';margin:8px 0;">' + milestone.name + '!</div>',
      '<div style="font-size:14px;color:#bbb;margin-top:6px;">🏅 Score: <b style="color:#fff">' + score.toFixed(1) + ' pts</b></div>'
    ].join('');

    overlay.appendChild(banner);
    document.body.appendChild(overlay);
    runParticles(canvas, milestone);

    setTimeout(function() { banner.style.animation = '_celebFadeOut 0.5s ease forwards'; }, milestone.duration - 500);
    setTimeout(function() { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, milestone.duration + 300);
  }

  // 피커 뱃지 반환 함수 (외부에서 호출 가능)
  function getPickerBadge(picker) {
    if (!picker) return '';
    var score = getScore(picker);
    var fired = getFired(picker);
    // 가장 높은 달성 티어 뱃지 반환
    for (var i = MILESTONES.length - 1; i >= 0; i--) {
      if (fired.indexOf(MILESTONES[i].tier) >= 0) {
        return MILESTONES[i].emoji;
      }
    }
    return '';
  }

  window.CelebrationSystem = {
    getBadge: getPickerBadge,

    // 서버 데이터로 오늘 점수 동기화 (페이지 로드 시)
    syncFromJobs: function(jobs) {
      var today = todayStr();
      var counts = {};

      for (var i = 0; i < jobs.length; i++) {
        var j = jobs[i];
        if (String(j.status||'').toLowerCase() !== 'completed') continue;
        var picker = j.picker; if (!picker) continue;
        var iso = String(j.endAtISO || j.startAtISO || '');
        if (!iso || iso.substring(0,10) !== today) continue;
        if (!counts[picker]) counts[picker] = { orders:0, skus:0 };
        counts[picker].orders += 1;
        counts[picker].skus   += parseInt(j.skuCount || 0, 10);
      }

      for (var p in counts) {
        var score = counts[p].orders * 1.5 + counts[p].skus * 0.5;
        var existing = getScore(p);
        if (score > existing) setScore(p, score);

        // ★ 핵심: 점수와 무관하게 항상 qualifying 티어 전부 fired에 저장
        //    (getBadge가 항상 올바른 뱃지를 표시하도록)
        var fired = getFired(p);
        var highestNewTier = null;
        for (var k = 0; k < MILESTONES.length; k++) {
          var m = MILESTONES[k];
          if (score >= m.score) {
            if (fired.indexOf(m.tier) < 0) {
              setFired(p, m.tier);
              highestNewTier = m; // 새로 달성한 티어 중 가장 높은 것 기록
            }
          }
        }
        // 새로 달성한 티어가 있으면 가장 높은 것만 애니메이션
        if (highestNewTier) {
          (function(milestone, picker, s) {
            setTimeout(function() { fire(milestone, picker, s); }, 800);
          })(highestNewTier, p, score);
        }
      }
    },

    // 완료 시 점수 추가 및 셀러브레이션 체크
    onComplete: function(picker, skuCount) {
      if (!picker) return;
      var addScore = 1.5 + (parseInt(skuCount || 0, 10) * 0.5);
      var newScore = getScore(picker) + addScore;
      setScore(picker, newScore);

      var fired = getFired(picker);
      // 높은 단계부터 체크 (가장 높은 미달성 티어 발동)
      for (var i = MILESTONES.length - 1; i >= 0; i--) {
        var m = MILESTONES[i];
        if (newScore >= m.score && fired.indexOf(m.tier) < 0) {
          setFired(picker, m.tier);
          (function(milestone, p, s) {
            setTimeout(function() { fire(milestone, p, s); }, 300);
          })(m, picker, newScore);
          break;
        }
      }
    }
  };
})();
</script>

<!-- ── Auto-time Confirm Modal ── -->
<div id="mobModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:9999;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;display:none;">
  <div style="background:#111d35;border:1px solid #1e3550;border-radius:16px;padding:28px 28px;text-align:center;min-width:270px;max-width:340px;margin:0 16px;">
    <div id="mobModalIcon" style="font-size:40px;margin-bottom:12px;">▶</div>
    <div id="mobModalTitle" style="font-size:16px;font-weight:700;color:#e2e8f0;margin-bottom:6px;">Ready to start this job?</div>
    <div id="mobModalSub" style="font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.6;">Current time will be automatically recorded as the Start Time.</div>
    <div style="display:-webkit-flex;display:flex;gap:10px;-webkit-justify-content:center;justify-content:center;">
      <button onclick="closeMobModal()" style="padding:11px 24px;border-radius:9px;border:1px solid #1e3550;background:transparent;color:#94a3b8;font-size:14px;font-weight:600;-webkit-appearance:none;">Cancel</button>
      <button id="mobModalYes" style="padding:11px 24px;border-radius:9px;border:none;color:#fff;font-size:14px;font-weight:700;background:#d97706;-webkit-appearance:none;">Confirm</button>
    </div>
  </div>
</div>
<script>
var _mobCancelCb = null;
function showMobModal(icon,title,sub,color,cb,onCancel){
  document.getElementById('mobModalIcon').textContent=icon;
  document.getElementById('mobModalTitle').textContent=title;
  document.getElementById('mobModalSub').textContent=sub;
  document.getElementById('mobModalYes').style.background=color;
  document.getElementById('mobModalYes').onclick=function(){ _mobCancelCb=null; closeMobModal(); cb(); };
  _mobCancelCb = onCancel || null;
  var m=document.getElementById('mobModal');
  m.style.display='-webkit-flex';
  m.style.display='flex';
}
function closeMobModal(){
  document.getElementById('mobModal').style.display='none';
  if(_mobCancelCb){ _mobCancelCb(); _mobCancelCb=null; }
}
function mobNudgePicker(){
  // 피커 미선택 상태에서 Start 클릭 시 안내
  var t = document.createElement('div');
  t.textContent = '⚠ Please select a picker first!';
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#d97706;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:700;z-index:9999;white-space:nowrap;';
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2000);
}
function mobConfirmStart(inv){
  showMobModal('▶','Ready to start this job?','Current time will be automatically recorded as the Start Time.','#d97706',
    function(){ App.start(inv); },
    function(){ App.cancelPicker(inv); } // Cancel → picker 로컬 초기화
  );
}
function mobConfirmComplete(inv){
  showMobModal('✓','Mark this job as complete?','Current time will be automatically recorded as the End Time.','#059669',function(){ App.complete(inv); });
}
</script>
